{% extends "ui/base.html" %}
{% block title %}Entrar · Panel{% endblock %}
{% block content %}
  <h1>Entrar</h1>
  {% if error %}<p style="color:#c33">{{ error }}</p>{% endif %}
  <form method="post" style="display:grid; gap:.6rem; max-width:320px">
    {% csrf_token %}
    <label>Usuario<br><input name="username" autofocus required></label>
    <label>Contraseña<br><input type="password" name="password" required></label>
    <label>Código TOTP<br><input name="token" inputmode="numeric" autocomplete="one-time-code" required></label>
    <button type="submit">Entrar</button>
  </form>
{% endblock %}
